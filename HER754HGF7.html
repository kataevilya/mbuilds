<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mbuilds — Админ панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #0f0f0f; color: #e0e0e0; }
        .admin-card { background: #1e1e1e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .btn-primary { background: #22c55e; }
        .btn-danger { background: #dc2626; }
        .user-row { background: #2d2d2d; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .badge-admin { background: #8b5cf6; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .badge-banned { background: #dc2626; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #22c55e; padding: 12px 20px; border-radius: 8px; z-index: 2000; }
        .toast.error { background: #dc2626; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content { background: #1e1e1e; max-width: 500px; width: 90%; border-radius: 16px; padding: 20px; }
        input, select, textarea { background: #2d2d2d; border: 1px solid #3f3f3f; border-radius: 8px; padding: 10px; color: white; width: 100%; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold"><i class="fas fa-shield-alt text-green-500 mr-2"></i> Админ панель</h1>
            <div class="flex gap-2">
                <a href="index.html" class="bg-gray-700 px-4 py-2 rounded-lg">На главную</a>
                <button id="logout-btn" class="bg-red-600 px-4 py-2 rounded-lg">Выйти</button>
            </div>
        </div>
        
        <div class="admin-card">
            <h2 class="text-xl font-bold mb-4">Пользователи</h2>
            <div id="users-list"></div>
            <button id="refresh-btn" class="btn-primary px-4 py-2 rounded-lg mt-2">Обновить</button>
        </div>
    </div>
    
    <div id="ban-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-4">Блокировка</h3>
            <div id="ban-user-info"></div>
            <select id="ban-type">
                <option value="permanent">Навсегда</option>
                <option value="temporary">На срок</option>
            </select>
            <div id="duration-field" style="display:none">
                <input type="number" id="ban-days" placeholder="Количество дней">
            </div>
            <textarea id="ban-reason" placeholder="Причина блокировки"></textarea>
            <div class="flex gap-2">
                <button id="confirm-ban" class="btn-danger flex-1 py-2 rounded-lg">Забанить</button>
                <button id="close-ban-modal" class="bg-gray-600 flex-1 py-2 rounded-lg">Отмена</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc, setDoc, deleteDoc, query, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDP5zBGogavsfh4of9wtawRY0FNqZBb8c8",
            authDomain: "mbuilds-project.firebaseapp.com",
            projectId: "mbuilds-project",
            storageBucket: "mbuilds-project.firebasestorage.app",
            messagingSenderId: "1010423737264",
            appId: "1:1010423737264:web:41af78a9944261b3fb4475"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const MAIN_ADMIN = "ryzik3489@gmail.com";
        
        let currentUser = null;
        
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function loadUsers() {
            const postsSnap = await getDocs(collection(db, 'posts'));
            const usersMap = new Map();
            postsSnap.forEach(doc => {
                const data = doc.data();
                if (!usersMap.has(data.userId)) {
                    usersMap.set(data.userId, {
                        userId: data.userId,
                        userName: data.userName,
                        userAvatar: data.userAvatar,
                        email: data.userEmail
                    });
                }
            });
            
            const bannedSnap = await getDocs(collection(db, 'banned_users'));
            const bannedSet = new Set(bannedSnap.docs.map(d => d.id));
            
            const container = document.getElementById('users-list');
            container.innerHTML = Array.from(usersMap.values()).map(user => `
                <div class="user-row flex justify-between items-center flex-wrap gap-3">
                    <div class="flex items-center gap-3">
                        <img src="${user.userAvatar || ''}" class="w-10 h-10 rounded-full">
                        <div>
                            <p class="font-semibold">${user.userName}</p>
                            <p class="text-sm text-gray-400">${user.userId.slice(0, 20)}...</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        ${bannedSet.has(user.userId) ? 
                            `<button class="bg-green-600 px-3 py-1 rounded-lg" onclick="window.unbanUser('${user.userId}')">Разбан</button>` :
                            `<button class="bg-red-600 px-3 py-1 rounded-lg" onclick="window.banUser('${user.userId}', '${user.userName}')">Забанить</button>`
                        }
                    </div>
                </div>
            `).join('');
        }
        
        window.banUser = (userId, userName) => {
            const modal = document.getElementById('ban-modal');
            document.getElementById('ban-user-info').innerHTML = `<p>Пользователь: <strong>${userName}</strong></p>`;
            modal.dataset.userId = userId;
            modal.dataset.userName = userName;
            modal.classList.add('active');
        };
        
        window.unbanUser = async (userId) => {
            if (confirm('Разблокировать пользователя?')) {
                await deleteDoc(doc(db, 'banned_users', userId));
                showToast('Пользователь разблокирован');
                loadUsers();
            }
        };
        
        document.getElementById('ban-type').onchange = (e) => {
            document.getElementById('duration-field').style.display = e.target.value === 'temporary' ? 'block' : 'none';
        };
        
        document.getElementById('confirm-ban').onclick = async () => {
            const modal = document.getElementById('ban-modal');
            const userId = modal.dataset.userId;
            const userName = modal.dataset.userName;
            const banType = document.getElementById('ban-type').value;
            const reason = document.getElementById('ban-reason').value || 'Не указана';
            
            let expiresAt = null;
            if (banType === 'temporary') {
                const days = parseInt(document.getElementById('ban-days').value);
                if (days) expiresAt = Timestamp.fromDate(new Date(Date.now() + days * 86400000));
            }
            
            await setDoc(doc(db, 'banned_users', userId), {
                userId, userName, banType, reason, expiresAt,
                bannedBy: currentUser.email,
                bannedAt: Timestamp.now()
            });
            showToast(`Пользователь ${userName} забанен`);
            modal.classList.remove('active');
            loadUsers();
        };
        
        document.getElementById('close-ban-modal').onclick = () => {
            document.getElementById('ban-modal').classList.remove('active');
        };
        
        document.getElementById('refresh-btn').onclick = loadUsers;
        
        onAuthStateChanged(auth, async (user) => {
            if (user && user.email === MAIN_ADMIN) {
                currentUser = user;
                await loadUsers();
            } else if (user) {
                showToast('Доступ запрещен', true);
                setTimeout(() => window.location.href = 'index.html', 2000);
            } else {
                try {
                    const result = await signInWithPopup(auth, new GoogleAuthProvider());
                    if (result.user.email === MAIN_ADMIN) {
                        currentUser = result.user;
                        await loadUsers();
                    } else {
                        showToast('Доступ запрещен', true);
                        setTimeout(() => window.location.href = 'index.html', 2000);
                    }
                } catch (err) { console.error(err); }
            }
        });
        
        document.getElementById('logout-btn').onclick = async () => {
            await signOut(auth);
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
