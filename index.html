<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Mbuilds Project</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #121212;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: #e0e0e0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        .card {
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .btn-primary {
            background: #22c55e;
        }
        
        .btn-secondary {
            background: #374151;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: #1e1e1e;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 16px;
            padding: 20px;
            margin: 16px;
        }
        
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
        }
        
        .scroll-top {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 48px;
            height: 48px;
            background: #374151;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 100;
        }
        
        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #374151;
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        input, textarea {
            background: #2d2d2d;
            border: 1px solid #3f3f3f;
            border-radius: 8px;
            padding: 12px;
            color: #e0e0e0;
            font-size: 16px;
            width: 100%;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #22c55e;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #323232;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            font-size: 14px;
            text-align: center;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .post-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        @media (min-width: 768px) {
            .avatar {
                width: 48px;
                height: 48px;
            }
        }
        
        #sentinel {
            height: 20px;
        }
        
        @media (max-width: 640px) {
            .post-actions {
                flex-direction: column;
            }
            .post-actions a {
                width: 100%;
                justify-content: center;
            }
        }
        
        .comments-section {
            border-top: 1px solid #374151;
            margin-top: 12px;
            padding-top: 12px;
        }
        
        .comment {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 8px;
        }
        
        .like-btn.liked {
            color: #ef4444;
        }
        
        .ban-banner {
            background: #dc2626;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .delete-btn {
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .delete-btn:hover {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <header class="bg-[#1e1e1e] shadow-md sticky top-0 z-50" style="padding-top: env(safe-area-inset-top);">
        <div class="max-w-2xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-white">
                <i class="fas fa-code mr-2 text-green-500"></i>
                Mbuilds
            </h1>
            <div id="auth-buttons" class="flex items-center gap-3"></div>
        </div>
    </header>
    
    <main class="max-w-2xl mx-auto px-4 py-4 pb-20">
        <div id="login-screen" class="flex flex-col items-center justify-center min-h-[70vh]">
            <div class="text-center">
                <i class="fas fa-users text-6xl text-green-500 mb-6"></i>
                <h2 class="text-2xl font-bold mb-4">Добро пожаловать!</h2>
                <p class="text-gray-400 mb-8">Войдите, чтобы делиться своими проектами</p>
                <button id="google-login-btn" class="btn-primary text-white px-8 py-3 rounded-lg font-semibold flex items-center gap-3 mx-auto shadow-lg">
                    <i class="fab fa-google text-xl"></i>
                    Войти через Google
                </button>
            </div>
        </div>
        
        <div id="feed-screen" style="display: none;">
            <div id="ban-banner" class="ban-banner" style="display: none;"></div>
            <div id="posts-container" class="space-y-4"></div>
            <div id="sentinel"></div>
        </div>
    </main>
    
    <div id="fab-add" class="fab" style="display: none;">
        <i class="fas fa-plus text-white text-2xl"></i>
    </div>
    
    <div id="scroll-top" class="scroll-top">
        <i class="fas fa-arrow-up text-white text-xl"></i>
    </div>
    
    <!-- Модалка создания поста -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-700">
                <h3 class="text-xl font-bold">Новый проект</h3>
                <button id="close-modal" class="text-gray-400 text-3xl leading-none">&times;</button>
            </div>
            <form id="post-form">
                <div class="mb-4">
                    <label class="block text-sm mb-2">Ссылка на картинку (необязательно)</label>
                    <input type="url" id="image-url" placeholder="https://example.com/image.jpg" class="w-full">
                </div>
                <div class="mb-4">
                    <label class="block text-sm mb-2">Описание проекта *</label>
                    <textarea id="description" rows="3" required class="w-full"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-sm mb-2">Ссылка на скачивание *</label>
                    <input type="url" id="download-url" required class="w-full">
                </div>
                <div class="mb-6">
                    <label class="block text-sm mb-2">Ссылка на исходный код (необязательно)</label>
                    <input type="url" id="source-url" class="w-full">
                </div>
                <button type="submit" class="btn-primary w-full py-3 rounded-lg font-semibold text-white">
                    Опубликовать
                </button>
            </form>
        </div>
    </div>
    
    <!-- Модалка комментариев -->
    <div id="comments-modal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-700">
                <h3 class="text-xl font-bold">Комментарии</h3>
                <button id="close-comments-modal" class="text-gray-400 text-3xl leading-none">&times;</button>
            </div>
            <div id="comments-list" class="max-h-96 overflow-y-auto mb-4"></div>
            <textarea id="new-comment" rows="2" placeholder="Напишите комментарий..." class="w-full"></textarea>
            <button id="add-comment-btn" class="btn-primary w-full mt-2 py-2 rounded-lg text-white">Отправить</button>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, getDocs, addDoc, serverTimestamp, limit, startAfter, updateDoc, doc, arrayUnion, arrayRemove, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDP5zBGogavsfh4of9wtawRY0FNqZBb8c8",
            authDomain: "mbuilds-project.firebaseapp.com",
            projectId: "mbuilds-project",
            storageBucket: "mbuilds-project.firebasestorage.app",
            messagingSenderId: "1010423737264",
            appId: "1:1010423737264:web:41af78a9944261b3fb4475"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        
        // ГЛАВНЫЙ АДМИН
        const MAIN_ADMIN_EMAIL = "ryzik3489@gmail.com";
        
        let currentUser = null;
        let allPosts = [];
        let lastDoc = null;
        let isLoading = false;
        let hasMore = true;
        let currentPostId = null;
        let isAdmin = false;
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#dc2626' : '#22c55e';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function formatDate(timestamp) {
            if (!timestamp) return 'Недавно';
            const date = timestamp.toDate();
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            if (minutes < 1) return 'Только что';
            if (minutes < 60) return `${minutes} мин назад`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} ч назад`;
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        // Проверка является ли пользователь администратором
        async function checkAdminStatus(email) {
            if (email === MAIN_ADMIN_EMAIL) return true;
            try {
                const adminRef = doc(db, 'admins', email);
                const adminSnap = await getDoc(adminRef);
                return adminSnap.exists();
            } catch {
                return false;
            }
        }
        
        async function checkBanStatus(userId) {
            try {
                const banRef = doc(db, 'banned_users', userId);
                const banSnap = await getDoc(banRef);
                if (banSnap.exists()) {
                    const banData = banSnap.data();
                    if (banData.expiresAt && banData.expiresAt.toDate() < new Date()) {
                        await deleteDoc(banRef);
                        return null;
                    }
                    return banData;
                }
                return null;
            } catch { return null; }
        }
        
        async function getComments(postId) {
            const postRef = doc(db, 'posts', postId);
            const postDoc = await getDoc(postRef);
            return postDoc.exists() ? (postDoc.data().comments || []) : [];
        }
        
        async function addComment(postId, text) {
            if (!currentUser) { showToast('Войдите', true); return false; }
            if (!text.trim()) { showToast('Введите комментарий', true); return false; }
            
            const comment = {
                id: Date.now().toString(),
                userId: currentUser.uid,
                userName: currentUser.displayName,
                userAvatar: currentUser.photoURL || '',
                text: text.trim(),
                createdAt: new Date().toISOString()
            };
            
            await updateDoc(doc(db, 'posts', postId), { comments: arrayUnion(comment) });
            showToast('Комментарий добавлен');
            return true;
        }
        
        async function toggleLike(postId) {
            if (!currentUser) { showToast('Войдите', true); return; }
            const postRef = doc(db, 'posts', postId);
            const post = (await getDoc(postRef)).data();
            const hasLiked = post.likes?.includes(currentUser.uid);
            await updateDoc(postRef, { likes: hasLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid) });
        }
        
        // Удаление поста (владелец или админ)
        window.deletePost = async (postId, postAuthorId) => {
            const canDelete = isAdmin || (currentUser && currentUser.uid === postAuthorId);
            if (!canDelete) { showToast('Вы не можете удалить этот пост', true); return; }
            if (confirm('Удалить пост?')) {
                await deleteDoc(doc(db, 'posts', postId));
                await loadPosts(true);
                showToast('Пост удален');
            }
        };
        
        async function loadPosts(reset = true) {
            if (isLoading) return;
            if (reset) { lastDoc = null; hasMore = true; allPosts = []; }
            if (!hasMore && !reset) return;
            
            isLoading = true;
            const container = document.getElementById('posts-container');
            if (reset) container.innerHTML = '<div class="loader"></div>';
            
            try {
                const q = lastDoc ? query(collection(db, 'posts'), orderBy('createdAt', 'desc'), startAfter(lastDoc), limit(10))
                                  : query(collection(db, 'posts'), orderBy('createdAt', 'desc'), limit(10));
                const snapshot = await getDocs(q);
                const newPosts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), likes: doc.data().likes || [], comments: doc.data().comments || [] }));
                
                if (newPosts.length < 10) hasMore = false;
                if (newPosts.length) {
                    lastDoc = snapshot.docs[snapshot.docs.length - 1];
                    allPosts = reset ? newPosts : [...allPosts, ...newPosts];
                    renderPosts();
                } else if (reset) {
                    container.innerHTML = '<div class="text-center py-10 text-gray-500">Пока нет постов</div>';
                }
            } catch (error) {
                showToast('Ошибка загрузки', true);
            }
            isLoading = false;
        }
        
        function renderPosts() {
            const container = document.getElementById('posts-container');
            if (!allPosts.length) return;
            
            container.innerHTML = allPosts.map(post => {
                const hasLiked = currentUser && post.likes?.includes(currentUser.uid);
                const commentsCount = post.comments?.length || 0;
                const likesCount = post.likes?.length || 0;
                const isAuthor = currentUser?.uid === post.userId;
                const canDelete = isAdmin || isAuthor;
                const hasImage = post.imageUrl && post.imageUrl.trim().length > 0;
                
                return `
                <div class="card overflow-hidden">
                    ${hasImage ? `<img src="${post.imageUrl}" class="post-image" onerror="this.style.display='none'">` : ''}
                    <div class="p-4">
                        <div class="flex items-center gap-3 mb-3">
                            <img src="${post.userAvatar || `https://ui-avatars.com/api/?name=${post.userName}`}" class="avatar">
                            <div class="flex-1">
                                <p class="font-semibold text-white">${escapeHtml(post.userName)}</p>
                                <p class="text-xs text-gray-400">${formatDate(post.createdAt)}</p>
                            </div>
                            ${canDelete ? `<i class="fas fa-trash delete-btn text-gray-400 hover:text-red-500" onclick="window.deletePost('${post.id}', '${post.userId}')"></i>` : ''}
                        </div>
                        <p class="text-gray-300 mb-4">${escapeHtml(post.description)}</p>
                        <div class="post-actions flex gap-2 mb-3">
                            <a href="${post.downloadUrl}" target="_blank" class="btn-primary flex-1 text-center py-2 rounded-lg text-white">Скачать</a>
                            ${post.sourceCodeUrl ? `<a href="${post.sourceCodeUrl}" target="_blank" class="btn-secondary flex-1 text-center py-2 rounded-lg text-white">GitHub</a>` : ''}
                        </div>
                        <div class="flex items-center gap-4 pt-3 border-t border-gray-700">
                            <button class="like-btn flex items-center gap-2 ${hasLiked ? 'liked' : ''}" data-post-id="${post.id}">
                                <i class="fas fa-heart"></i> <span>${likesCount}</span>
                            </button>
                            <button class="comments-btn flex items-center gap-2" data-post-id="${post.id}">
                                <i class="fas fa-comment"></i> <span>${commentsCount}</span>
                            </button>
                        </div>
                        ${commentsCount > 0 ? `
                        <div class="comments-section">
                            <div class="comment text-sm">
                                <strong>${escapeHtml(post.comments[0]?.userName)}</strong>: ${escapeHtml(post.comments[0]?.text)}
                            </div>
                            ${commentsCount >= 2 ? `<button class="view-all-comments text-green-500 text-sm mt-2" data-post-id="${post.id}">Посмотреть все (${commentsCount})</button>` : ''}
                        </div>
                        ` : ''}
                    </div>
                </div>
            `}).join('');
            
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.onclick = async () => { await toggleLike(btn.dataset.postId); await loadPosts(true); };
            });
            document.querySelectorAll('.comments-btn, .view-all-comments').forEach(btn => {
                btn.onclick = async () => {
                    currentPostId = btn.dataset.postId;
                    const comments = await getComments(currentPostId);
                    document.getElementById('comments-list').innerHTML = comments.map(c => `
                        <div class="comment">
                            <div class="flex items-center gap-2 mb-1">
                                <img src="${c.userAvatar || ''}" class="w-6 h-6 rounded-full">
                                <span class="font-semibold text-sm">${escapeHtml(c.userName)}</span>
                            </div>
                            <p class="text-sm">${escapeHtml(c.text)}</p>
                        </div>
                    `).join('');
                    document.getElementById('comments-modal').classList.add('active');
                };
            });
        }
        
        document.getElementById('add-comment-btn').onclick = async () => {
            const text = document.getElementById('new-comment').value;
            if (await addComment(currentPostId, text)) {
                document.getElementById('new-comment').value = '';
                await loadPosts(true);
                document.getElementById('comments-modal').classList.remove('active');
            }
        };
        
        document.getElementById('post-form').onsubmit = async (e) => {
            e.preventDefault();
            const desc = document.getElementById('description').value;
            const url = document.getElementById('download-url').value;
            if (!desc || !url) { showToast('Заполните поля', true); return; }
            
            await addDoc(collection(db, 'posts'), {
                userId: currentUser.uid,
                userName: currentUser.displayName,
                userAvatar: currentUser.photoURL,
                userEmail: currentUser.email,
                imageUrl: document.getElementById('image-url').value || null,
                description: desc,
                downloadUrl: url,
                sourceCodeUrl: document.getElementById('source-url').value || null,
                createdAt: serverTimestamp(),
                likes: [],
                comments: []
            });
            showToast('Опубликовано!');
            closeModal();
            await loadPosts(true);
        };
        
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        document.getElementById('fab-add').onclick = () => document.getElementById('modal').classList.add('active');
        document.getElementById('close-modal').onclick = closeModal;
        document.getElementById('close-comments-modal').onclick = () => document.getElementById('comments-modal').classList.remove('active');
        
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            const loginScreen = document.getElementById('login-screen');
            const feedScreen = document.getElementById('feed-screen');
            const fab = document.getElementById('fab-add');
            const authButtons = document.getElementById('auth-buttons');
            
            if (user) {
                const banInfo = await checkBanStatus(user.uid);
                isAdmin = await checkAdminStatus(user.email);
                
                if (banInfo) {
                    document.getElementById('ban-banner').style.display = 'block';
                    fab.style.display = 'none';
                } else {
                    document.getElementById('ban-banner').style.display = 'none';
                    fab.style.display = 'flex';
                }
                
                loginScreen.style.display = 'none';
                feedScreen.style.display = 'block';
                
                // Показываем кнопку админки ТОЛЬКО для админов
                const adminLink = isAdmin ? `<a href="HER754HGF7.html" class="bg-purple-600 px-3 py-1.5 rounded-lg text-sm"><i class="fas fa-shield-alt"></i> Админ</a>` : '';
                
                authButtons.innerHTML = `
                    <img src="${user.photoURL || ''}" class="w-8 h-8 rounded-full">
                    ${adminLink}
                    <button id="logout-btn" class="bg-red-600 px-3 py-1.5 rounded-lg text-sm">Выйти</button>
                `;
                document.getElementById('logout-btn').onclick = async () => { await signOut(auth); location.reload(); };
                if (!banInfo) await loadPosts(true);
            } else {
                loginScreen.style.display = 'flex';
                feedScreen.style.display = 'none';
                fab.style.display = 'none';
                authButtons.innerHTML = '';
            }
        });
        
        document.getElementById('google-login-btn').onclick = async () => {
            try {
                await signInWithPopup(auth, googleProvider);
                showToast('Добро пожаловать!');
            } catch (err) { showToast('Ошибка входа', true); }
        };
        
        const scrollBtn = document.getElementById('scroll-top');
        window.onscroll = () => scrollBtn.classList.toggle('visible', window.scrollY > 300);
        scrollBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading && hasMore && currentUser) loadPosts(false);
        }, { threshold: 0.1 });
        observer.observe(document.getElementById('sentinel'));
    </script>
</body>
</html>
